{% extends "core/storage_base.html" %}

{% block storage_content %}
  <section class="storage-tab-content">
    <form method="post" action="{% url 'core:storage_content_update' storage.storage_id %}" class="panel storage-content-panel">
      {% csrf_token %}
      <div class="panel-heading">
        <div>
          <h2>Content</h2>
          <p class="panel-meta">Controls which Proxmox content types this storage accepts. Saving runs a fresh storage scan before applying changes.</p>
        </div>
      </div>

      <div class="storage-content-list">
        {% for option in content_options %}
          <label class="storage-content-row{% if option.usage_count %} has-usage{% endif %}">
            <span class="storage-content-main">
              <input type="checkbox" name="content" value="{{ option.key }}" {% if option.selected %}checked{% endif %}>
              <span>
                <strong>{{ option.label }}</strong>
                <span class="storage-content-key">{{ option.key }}</span>
              </span>
            </span>
            <span class="storage-content-description">{{ option.description }}</span>
            <span class="storage-content-usage">
              {% if option.usage_count %}
                <span class="badge">In use: {{ option.usage_count }}</span>
                {% if option.usage_examples %}
                  <span class="muted">{{ option.usage_examples|join:", " }}</span>
                {% endif %}
              {% else %}
                <span class="muted">No current usage found in the latest scan.</span>
              {% endif %}
            </span>
          </label>
        {% endfor %}
      </div>
      <div class="storage-content-actions">
        <button class="primary-action" type="submit">Save</button>
      </div>
    </form>
  </section>
{% endblock storage_content %}
