{% load nav_tags %}
<section class="tree-module tree-group expanded" data-tree-module="local-node-{{ host.cluster_key }}-{{ host.node }}" aria-label="{{ host.node }} local datastores">
  <button class="tree-node tree-subhead" type="button" data-tree-toggle aria-expanded="true">
    <span class="tree-caret" data-tree-caret>v</span>
    <span class="tree-icon"><i data-vicon="host" aria-hidden="true"></i></span>
    <span class="tree-label">{{ host.node }}</span>
  </button>
  <div class="tree-children">
    {% for s in host.storages %}
      {% url 'core:api_storage_summary' host.cluster_key host.node s.storage_id as api_summary_url %}
      <a class="tree-node tree-leaf storage-leaf {% if active_api_node == host.node and active_api_storage == s.storage_id %}active{% endif %}" href="{% sticky_object_url api_summary_url %}" title="{{ s.storage_id }}{% if s.type %} ({{ s.type }}){% endif %}">
        <span class="tree-icon"><i data-vicon="storage" aria-hidden="true"></i></span>
        <span class="tree-label">{{ s.storage_id }}</span>
      </a>
    {% endfor %}
  </div>
</section>
