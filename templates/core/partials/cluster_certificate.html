<div class="cluster-certificate">
  <div class="cluster-certificate-heading"><i data-lucide="shield-check" aria-hidden="true"></i><strong>Presented TLS certificate</strong></div>
  <dl><dt>Subject</dt><dd>{{ certificate.subject }}</dd><dt>Issuer</dt><dd>{{ certificate.issuer }}</dd><dt>SHA-256</dt><dd><code>{{ certificate.sha256_fingerprint }}</code></dd></dl>
</div>
