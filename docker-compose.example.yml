services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pve_helper}
      POSTGRES_USER: ${DB_ADMIN_USER:-pve_helper_admin}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD:-pve_helper_admin_dev_password}
      APP_DB_USER: ${DB_USER:-pve_helper}
      APP_DB_PASSWORD: ${DB_PASSWORD:-pve_helper_dev_password}
    volumes:
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      console:
        condition: service_healthy
    environment:
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-0}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-86400s}
      NGINX_PROXY_SEND_TIMEOUT: ${NGINX_PROXY_SEND_TIMEOUT:-86400s}
      NGINX_SEND_TIMEOUT: ${NGINX_SEND_TIMEOUT:-86400s}
      TRUENAS_FS_STORAGE_ID: ${TRUENAS_FS_STORAGE_ID:-nfs-fs}
      TRUENAS_VM_STORAGE_ID: ${TRUENAS_VM_STORAGE_ID:-nfs-vm}
      TRUENAS_FS_CONTAINER_PATH: ${TRUENAS_FS_CONTAINER_PATH:-/storages/truenas-fs}
      TRUENAS_VM_CONTAINER_PATH: ${TRUENAS_VM_CONTAINER_PATH:-/storages/truenas-vm}
    ports:
      - "${APP_PORT:-21080}:80"
    volumes:
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - ${TRUENAS_FS_HOST_PATH:-./dev-storage/truenas-fs}:${TRUENAS_FS_CONTAINER_PATH:-/storages/truenas-fs}:ro
      - ${TRUENAS_VM_HOST_PATH:-./dev-storage/truenas-vm}:${TRUENAS_VM_CONTAINER_PATH:-/storages/truenas-vm}:ro
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    pids_limit: 100
    mem_limit: 256m
    cpu_shares: 256
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: .
    image: pve-helper:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-insecure-change-me}
      DEBUG: ${DEBUG:-true}
      APP_REQUIRE_LOGIN: ${APP_REQUIRE_LOGIN:-false}
      APP_BASE_URL: ${APP_BASE_URL:-https://pve-helper.example.com}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-pve-helper.example.com,dockerhost,localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://pve-helper.example.com,http://dockerhost:21080,http://localhost:21080}
      USE_X_FORWARDED_HOST: ${USE_X_FORWARDED_HOST:-true}
      SECURE_PROXY_SSL_HEADER: ${SECURE_PROXY_SSL_HEADER:-true}
      DB_NAME: ${DB_NAME:-pve_helper}
      DB_USER: ${DB_USER:-pve_helper}
      DB_PASSWORD: ${DB_PASSWORD:-pve_helper_dev_password}
      DB_HOST: db
      DB_PORT: "5432"
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-https://auth.example.com/application/o/pve-helper/}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-https://pve-helper.example.com/auth/oidc/callback}
      OIDC_REQUIRED_GROUP: ${OIDC_REQUIRED_GROUP:-pve-helper-admins}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email groups}
      PVE_ENDPOINTS: ${PVE_ENDPOINTS:-https://pve-node-1.example.com:8006}
      PVE_VERIFY_TLS: ${PVE_VERIFY_TLS:-true}
      PVE_CA_BUNDLE: ${PVE_CA_BUNDLE:-}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-/etc/ssl/pve-helper-ca-bundle.pem}
      PVE_API_TOKEN_ID: ${PVE_API_TOKEN_ID:-}
      PVE_API_TOKEN_SECRET: ${PVE_API_TOKEN_SECRET:-}
      PVE_EXPECTED_CONSUMERS: ${PVE_EXPECTED_CONSUMERS:-pve-node-1}
      SCHEDULED_ACTIONS_ENABLED: ${SCHEDULED_ACTIONS_ENABLED:-true}
      SCHEDULED_ACTION_TIMEOUT_SECONDS: ${SCHEDULED_ACTION_TIMEOUT_SECONDS:-1800}
      SCHEDULED_ACTION_POLL_INTERVAL_SECONDS: ${SCHEDULED_ACTION_POLL_INTERVAL_SECONDS:-5}
      SCHEDULED_ACTION_RUN_RETENTION_DAYS: ${SCHEDULED_ACTION_RUN_RETENTION_DAYS:-90}
      TRUENAS_FS_STORAGE_ID: ${TRUENAS_FS_STORAGE_ID:-nfs-fs}
      TRUENAS_VM_STORAGE_ID: ${TRUENAS_VM_STORAGE_ID:-nfs-vm}
      TRUENAS_FS_EXPORT: ${TRUENAS_FS_EXPORT:-}
      TRUENAS_VM_EXPORT: ${TRUENAS_VM_EXPORT:-}
      TRUENAS_FS_CONTAINER_PATH: ${TRUENAS_FS_CONTAINER_PATH:-/storages/truenas-fs}
      TRUENAS_VM_CONTAINER_PATH: ${TRUENAS_VM_CONTAINER_PATH:-/storages/truenas-vm}
      STORAGE_WRITE_ENABLED: ${STORAGE_WRITE_ENABLED:-true}
      STORAGE_UPLOAD_MAX_SIZE_MB: ${STORAGE_UPLOAD_MAX_SIZE_MB:-0}
      FILE_UPLOAD_TEMP_DIR: ${FILE_UPLOAD_TEMP_DIR:-/storages/truenas-fs/.pve-helper-upload-tmp}
      STORAGE_IMAGE_INFO_ENABLED: ${STORAGE_IMAGE_INFO_ENABLED:-true}
      STORAGE_IMAGE_INFO_TIMEOUT_SECONDS: ${STORAGE_IMAGE_INFO_TIMEOUT_SECONDS:-15}
      STORAGE_INFLATE_TIMEOUT_SECONDS: ${STORAGE_INFLATE_TIMEOUT_SECONDS:-14400}
      STORAGE_INFLATE_WORKER_PRESERVES_OWNER: ${STORAGE_INFLATE_WORKER_PRESERVES_OWNER:-true}
      STORAGE_DOWNLOAD_ACCEL_ENABLED: ${STORAGE_DOWNLOAD_ACCEL_ENABLED:-true}
      STORAGE_DOWNLOAD_ACCEL_PREFIX: ${STORAGE_DOWNLOAD_ACCEL_PREFIX:-/_pve_helper_download}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-86400}
      Q_CLUSTER_WORKERS: ${Q_CLUSTER_WORKERS:-1}
      Q_CLUSTER_TIMEOUT: ${Q_CLUSTER_TIMEOUT:-1800}
      Q_CLUSTER_RETRY: ${Q_CLUSTER_RETRY:-2100}
      TZ: ${TZ:-Europe/Stockholm}
    volumes:
      - ./certs/ca-bundle.pem:/etc/ssl/pve-helper-ca-bundle.pem:ro
      - ${TRUENAS_FS_HOST_PATH:-./dev-storage/truenas-fs}:/storages/truenas-fs:ro
      - ${TRUENAS_VM_HOST_PATH:-./dev-storage/truenas-vm}:/storages/truenas-vm:ro
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 512m
    cpu_shares: 512
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/live', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  console:
    image: pve-helper:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "console_app.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "1"]
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-insecure-change-me}
      DEBUG: ${DEBUG:-true}
      DB_NAME: ${DB_NAME:-pve_helper}
      DB_USER: ${DB_USER:-pve_helper}
      DB_PASSWORD: ${DB_PASSWORD:-pve_helper_dev_password}
      DB_HOST: db
      DB_PORT: "5432"
      PVE_ENDPOINTS: ${PVE_ENDPOINTS:-https://pve-node-1.example.com:8006}
      PVE_VERIFY_TLS: ${PVE_VERIFY_TLS:-true}
      PVE_CA_BUNDLE: ${PVE_CA_BUNDLE:-}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-/etc/ssl/pve-helper-ca-bundle.pem}
      PVE_API_TOKEN_ID: ${PVE_API_TOKEN_ID:-}
      PVE_API_TOKEN_SECRET: ${PVE_API_TOKEN_SECRET:-}
      CONSOLE_ENABLED: ${CONSOLE_ENABLED:-true}
      CONSOLE_SESSION_TTL_SECONDS: ${CONSOLE_SESSION_TTL_SECONDS:-30}
      CONSOLE_CONNECT_TIMEOUT_SECONDS: ${CONSOLE_CONNECT_TIMEOUT_SECONDS:-10}
      TZ: ${TZ:-Europe/Stockholm}
    volumes:
      - ./certs/ca-bundle.pem:/etc/ssl/pve-helper-ca-bundle.pem:ro
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 100
    mem_limit: 256m
    cpu_shares: 256
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz/live', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: pve-helper:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-insecure-change-me}
      DEBUG: ${DEBUG:-true}
      APP_REQUIRE_LOGIN: ${APP_REQUIRE_LOGIN:-false}
      APP_BASE_URL: ${APP_BASE_URL:-https://pve-helper.example.com}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-pve-helper.example.com,dockerhost,localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://pve-helper.example.com,http://dockerhost:21080,http://localhost:21080}
      USE_X_FORWARDED_HOST: ${USE_X_FORWARDED_HOST:-true}
      SECURE_PROXY_SSL_HEADER: ${SECURE_PROXY_SSL_HEADER:-true}
      DB_NAME: ${DB_NAME:-pve_helper}
      DB_USER: ${DB_USER:-pve_helper}
      DB_PASSWORD: ${DB_PASSWORD:-pve_helper_dev_password}
      DB_HOST: db
      DB_PORT: "5432"
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-https://auth.example.com/application/o/pve-helper/}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-https://pve-helper.example.com/auth/oidc/callback}
      OIDC_REQUIRED_GROUP: ${OIDC_REQUIRED_GROUP:-pve-helper-admins}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email groups}
      PVE_ENDPOINTS: ${PVE_ENDPOINTS:-https://pve-node-1.example.com:8006}
      PVE_VERIFY_TLS: ${PVE_VERIFY_TLS:-true}
      PVE_CA_BUNDLE: ${PVE_CA_BUNDLE:-}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-/etc/ssl/pve-helper-ca-bundle.pem}
      PVE_API_TOKEN_ID: ${PVE_API_TOKEN_ID:-}
      PVE_API_TOKEN_SECRET: ${PVE_API_TOKEN_SECRET:-}
      PVE_EXPECTED_CONSUMERS: ${PVE_EXPECTED_CONSUMERS:-pve-node-1}
      SCHEDULED_ACTIONS_ENABLED: ${SCHEDULED_ACTIONS_ENABLED:-true}
      SCHEDULED_ACTION_TIMEOUT_SECONDS: ${SCHEDULED_ACTION_TIMEOUT_SECONDS:-1800}
      SCHEDULED_ACTION_POLL_INTERVAL_SECONDS: ${SCHEDULED_ACTION_POLL_INTERVAL_SECONDS:-5}
      SCHEDULED_ACTION_RUN_RETENTION_DAYS: ${SCHEDULED_ACTION_RUN_RETENTION_DAYS:-90}
      TRUENAS_FS_STORAGE_ID: ${TRUENAS_FS_STORAGE_ID:-nfs-fs}
      TRUENAS_VM_STORAGE_ID: ${TRUENAS_VM_STORAGE_ID:-nfs-vm}
      TRUENAS_FS_EXPORT: ${TRUENAS_FS_EXPORT:-}
      TRUENAS_VM_EXPORT: ${TRUENAS_VM_EXPORT:-}
      TRUENAS_FS_CONTAINER_PATH: ${TRUENAS_FS_CONTAINER_PATH:-/storages/truenas-fs}
      TRUENAS_VM_CONTAINER_PATH: ${TRUENAS_VM_CONTAINER_PATH:-/storages/truenas-vm}
      STORAGE_WRITE_ENABLED: ${STORAGE_WRITE_ENABLED:-true}
      STORAGE_UPLOAD_MAX_SIZE_MB: ${STORAGE_UPLOAD_MAX_SIZE_MB:-0}
      STORAGE_IMAGE_INFO_ENABLED: ${STORAGE_IMAGE_INFO_ENABLED:-true}
      STORAGE_IMAGE_INFO_TIMEOUT_SECONDS: ${STORAGE_IMAGE_INFO_TIMEOUT_SECONDS:-15}
      STORAGE_INFLATE_TIMEOUT_SECONDS: ${STORAGE_INFLATE_TIMEOUT_SECONDS:-14400}
      STORAGE_INFLATE_WORKER_PRESERVES_OWNER: ${STORAGE_INFLATE_WORKER_PRESERVES_OWNER:-true}
      Q_CLUSTER_WORKERS: ${Q_CLUSTER_WORKERS:-1}
      Q_CLUSTER_TIMEOUT: ${Q_CLUSTER_TIMEOUT:-1800}
      Q_CLUSTER_RETRY: ${Q_CLUSTER_RETRY:-2100}
      TZ: ${TZ:-Europe/Stockholm}
    command: ["python", "manage.py", "qcluster"]
    user: "0:0"
    group_add:
      - "10001"
    volumes:
      - ./certs/ca-bundle.pem:/etc/ssl/pve-helper-ca-bundle.pem:ro
      - ${TRUENAS_FS_HOST_PATH:-./dev-storage/truenas-fs}:/storages/truenas-fs:ro
      - ${TRUENAS_VM_HOST_PATH:-./dev-storage/truenas-vm}:/storages/truenas-vm:ro
    healthcheck:
      test: ["CMD", "python", "/app/scripts/worker_healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    pids_limit: 200
    mem_limit: 512m
    cpu_shares: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  default:
    name: pve-helper
