name: pve-helper-tools

services:
  js-check:
    image: node:22-alpine
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: sh -lc "npm install --no-audit --no-fund && npm run check"
    environment:
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
    volumes:
      - .:/workspace

  js-format:
    image: node:22-alpine
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    command: sh -lc "npm install --no-audit --no-fund && npm run format"
    environment:
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
    volumes:
      - .:/workspace
