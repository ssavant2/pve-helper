name: Test and publish latest

on:
  workflow_dispatch:
  push:
    tags:
      - "publish-*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/ssavant2/pve-helper
  DB_IMAGE_NAME: ghcr.io/ssavant2/pve-helper-db
  NGINX_IMAGE_NAME: ghcr.io/ssavant2/pve-helper-nginx

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build test image
        run: docker compose -f docker-compose.example.yml build web

      - name: Run Django tests
        run: >-
          docker compose -f docker-compose.example.yml run --rm
          -e DB_USER=pve_helper_admin
          -e DB_PASSWORD=pve_helper_admin_dev_password
          web python manage.py test --settings=pve_helper.test_settings

      - name: Check JavaScript formatting and lint
        run: docker compose -f docker-compose.tools.yml run --rm js-check
        env:
          # actions/checkout creates the ephemeral workspace as root. Local runs
          # retain the host UID/GID defaults so node_modules stays user-owned.
          HOST_UID: "0"
          HOST_GID: "0"

      - name: Run browser end-to-end tests
        run: docker compose -f docker-compose.tools.yml run --rm e2e

      - name: Tear down test stacks
        if: always()
        run: |
          docker compose -f docker-compose.tools.yml down --volumes --remove-orphans
          docker compose -f docker-compose.example.yml down --volumes --remove-orphans

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=v0.1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and publish database image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.db
          push: true
          tags: |
            ${{ env.DB_IMAGE_NAME }}:latest
            ${{ env.DB_IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=v0.1

      - name: Build and publish nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: |
            ${{ env.NGINX_IMAGE_NAME }}:latest
            ${{ env.NGINX_IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=v0.1

      - name: Build deployment assets
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/build_release_assets.sh

      - name: Publish deployment assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              dist/docker-compose.yml \
              dist/example.env \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/docker-compose.yml \
              dist/example.env \
              --title "pve-helper v0.1 alpha" \
              --generate-notes
          fi
