name: pve-helper

services:
  db:
    image: ghcr.io/ssavant2/pve-helper-db:${PVE_HELPER_VERSION:-latest}
    pull_policy: missing
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pve_helper}
      POSTGRES_USER: ${DB_ADMIN_USER:-pve_helper_admin}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD:?Set DB_ADMIN_PASSWORD in .env}
      APP_DB_USER: ${DB_USER:-pve_helper}
      APP_DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: ghcr.io/ssavant2/pve-helper-nginx:${PVE_HELPER_VERSION:-latest}
    pull_policy: missing
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      console:
        condition: service_healthy
    environment:
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-0}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-86400s}
      NGINX_PROXY_SEND_TIMEOUT: ${NGINX_PROXY_SEND_TIMEOUT:-86400s}
      NGINX_SEND_TIMEOUT: ${NGINX_SEND_TIMEOUT:-86400s}
      # Optional IP/CIDR of the external reverse proxy trusted for XFF/proto.
      NGINX_TRUSTED_PROXY: ${NGINX_TRUSTED_PROXY:-127.0.0.1}
    ports:
      - "${APP_PORT:-21080}:80"
    volumes:
      - storage_accel_state:/storage-accel-state
      - type: bind
        source: ${PVE_HELPER_STORAGE_ROOT:?Set PVE_HELPER_STORAGE_ROOT in .env}
        target: /storages
        read_only: true
        bind:
          propagation: rprivate
          recursive: readonly
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    pids_limit: 100
    mem_limit: 256m
    cpu_shares: 256
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz/nginx || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ghcr.io/ssavant2/pve-helper:${PVE_HELPER_VERSION:-latest}
    pull_policy: missing
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:?Set APP_SECRET_KEY in .env}
      DEBUG: ${DEBUG:-false}
      APP_REQUIRE_LOGIN: ${APP_REQUIRE_LOGIN:-true}
      APP_BASE_URL: ${APP_BASE_URL:?Set APP_BASE_URL in .env}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Set ALLOWED_HOSTS in .env}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?Set CSRF_TRUSTED_ORIGINS in .env}
      USE_X_FORWARDED_HOST: ${USE_X_FORWARDED_HOST:-true}
      SECURE_PROXY_SSL_HEADER: ${SECURE_PROXY_SSL_HEADER:-true}
      DB_NAME: ${DB_NAME:-pve_helper}
      DB_USER: ${DB_USER:-pve_helper}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_HOST: db
      DB_PORT: "5432"
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-https://auth.example.com/application/o/pve-helper/}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REQUIRED_GROUP: ${OIDC_REQUIRED_GROUP:-pve-helper-admins}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email groups}
      OIDC_OP_AUTHORIZATION_ENDPOINT: ${OIDC_OP_AUTHORIZATION_ENDPOINT:-}
      OIDC_OP_TOKEN_ENDPOINT: ${OIDC_OP_TOKEN_ENDPOINT:-}
      OIDC_OP_USER_ENDPOINT: ${OIDC_OP_USER_ENDPOINT:-}
      OIDC_OP_JWKS_ENDPOINT: ${OIDC_OP_JWKS_ENDPOINT:-}
      OIDC_OP_END_SESSION_ENDPOINT: ${OIDC_OP_END_SESSION_ENDPOINT:-}
      # Optional legacy first-cluster bootstrap. New installs add clusters in the UI.
      PVE_ENDPOINTS: ${PVE_ENDPOINTS:-}
      PVE_VERIFY_TLS: ${PVE_VERIFY_TLS:-true}
      PVE_CA_BUNDLE: ${PVE_CA_BUNDLE:-}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      PVE_API_TOKEN_ID: ${PVE_API_TOKEN_ID:-}
      PVE_API_TOKEN_SECRET: ${PVE_API_TOKEN_SECRET:-}
      # Seals write-only cluster API tokens entered through the onboarding UI.
      PVE_HELPER_ENCRYPTION_KEYS: ${PVE_HELPER_ENCRYPTION_KEYS:?Set PVE_HELPER_ENCRYPTION_KEYS in .env}
      PVE_HELPER_ENCRYPTION_ACTIVE_KEY_ID: ${PVE_HELPER_ENCRYPTION_ACTIVE_KEY_ID:?Set PVE_HELPER_ENCRYPTION_ACTIVE_KEY_ID in .env}
      SCHEDULED_ACTION_TIMEOUT_SECONDS: ${SCHEDULED_ACTION_TIMEOUT_SECONDS:-1800}
      BACKUP_TASK_TIMEOUT_SECONDS: ${BACKUP_TASK_TIMEOUT_SECONDS:-21600}
      SCHEDULED_ACTION_POLL_INTERVAL_SECONDS: ${SCHEDULED_ACTION_POLL_INTERVAL_SECONDS:-5}
      SCHEDULED_ACTION_RUN_RETENTION_DAYS: ${SCHEDULED_ACTION_RUN_RETENTION_DAYS:-90}
      CONSOLE_SESSION_RETENTION_HOURS: ${CONSOLE_SESSION_RETENTION_HOURS:-24}
      STORAGE_WRITE_ENABLED: ${STORAGE_WRITE_ENABLED:-false}
      STORAGE_METADATA_REFRESH_INTERVAL_MINUTES: ${STORAGE_METADATA_REFRESH_INTERVAL_MINUTES:-1}
      STORAGE_VOLUME_REFRESH_INTERVAL_MINUTES: ${STORAGE_VOLUME_REFRESH_INTERVAL_MINUTES:-5}
      STORAGE_UPLOAD_MAX_SIZE_MB: ${STORAGE_UPLOAD_MAX_SIZE_MB:-0}
      FILE_UPLOAD_TEMP_DIR: ${FILE_UPLOAD_TEMP_DIR:-}
      STORAGE_IMAGE_INFO_ENABLED: ${STORAGE_IMAGE_INFO_ENABLED:-true}
      STORAGE_IMAGE_INFO_TIMEOUT_SECONDS: ${STORAGE_IMAGE_INFO_TIMEOUT_SECONDS:-15}
      STORAGE_INFLATE_TIMEOUT_SECONDS: ${STORAGE_INFLATE_TIMEOUT_SECONDS:-14400}
      STORAGE_INFLATE_WORKER_PRESERVES_OWNER: ${STORAGE_INFLATE_WORKER_PRESERVES_OWNER:-true}
      SCAN_TASK_TIMEOUT_SECONDS: ${SCAN_TASK_TIMEOUT_SECONDS:-21600}
      STORAGE_DOWNLOAD_ACCEL_ENABLED: ${STORAGE_DOWNLOAD_ACCEL_ENABLED:-true}
      STORAGE_DOWNLOAD_ACCEL_PREFIX: ${STORAGE_DOWNLOAD_ACCEL_PREFIX:-/_pve_helper_download}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-86400}
      Q_CLUSTER_WORKERS: ${Q_CLUSTER_WORKERS:-1}
      Q_CLUSTER_TIMEOUT: ${Q_CLUSTER_TIMEOUT:-1800}
      Q_CLUSTER_RETRY: ${Q_CLUSTER_RETRY:-2100}
      TZ: ${TZ:-Europe/Stockholm}
    volumes:
      - ./certs/ca-bundle.pem:/etc/ssl/pve-helper-ca-bundle.pem:ro
      - storage_accel_state:/storage-accel-state:ro
      - type: bind
        source: ${PVE_HELPER_STORAGE_ROOT:?Set PVE_HELPER_STORAGE_ROOT in .env}
        target: /storages
        bind:
          propagation: rslave
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 512m
    cpu_shares: 512
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.parse, urllib.request; host=urllib.parse.urlparse(os.environ['APP_BASE_URL']).netloc; request=urllib.request.Request('http://127.0.0.1:8000/healthz/live', headers={'Host': host}); urllib.request.urlopen(request, timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  console:
    image: ghcr.io/ssavant2/pve-helper:${PVE_HELPER_VERSION:-latest}
    pull_policy: missing
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "console_app.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "1"]
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:?Set APP_SECRET_KEY in .env}
      DEBUG: ${DEBUG:-false}
      DB_NAME: ${DB_NAME:-pve_helper}
      DB_USER: ${DB_USER:-pve_helper}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_HOST: db
      DB_PORT: "5432"
      PVE_ENDPOINTS: ${PVE_ENDPOINTS:-}
      PVE_VERIFY_TLS: ${PVE_VERIFY_TLS:-true}
      PVE_CA_BUNDLE: ${PVE_CA_BUNDLE:-}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      PVE_API_TOKEN_ID: ${PVE_API_TOKEN_ID:-}
      PVE_API_TOKEN_SECRET: ${PVE_API_TOKEN_SECRET:-}
      PVE_HELPER_ENCRYPTION_KEYS: ${PVE_HELPER_ENCRYPTION_KEYS:?Set PVE_HELPER_ENCRYPTION_KEYS in .env}
      PVE_HELPER_ENCRYPTION_ACTIVE_KEY_ID: ${PVE_HELPER_ENCRYPTION_ACTIVE_KEY_ID:?Set PVE_HELPER_ENCRYPTION_ACTIVE_KEY_ID in .env}
      CONSOLE_ENABLED: ${CONSOLE_ENABLED:-true}
      CONSOLE_SESSION_TTL_SECONDS: ${CONSOLE_SESSION_TTL_SECONDS:-30}
      CONSOLE_CONNECT_TIMEOUT_SECONDS: ${CONSOLE_CONNECT_TIMEOUT_SECONDS:-10}
      TZ: ${TZ:-Europe/Stockholm}
    volumes:
      - ./certs/ca-bundle.pem:/etc/ssl/pve-helper-ca-bundle.pem:ro
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 100
    mem_limit: 256m
    cpu_shares: 256
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz/live', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ghcr.io/ssavant2/pve-helper:${PVE_HELPER_VERSION:-latest}
    pull_policy: missing
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:?Set APP_SECRET_KEY in .env}
      DEBUG: ${DEBUG:-false}
      APP_REQUIRE_LOGIN: ${APP_REQUIRE_LOGIN:-true}
      APP_BASE_URL: ${APP_BASE_URL:?Set APP_BASE_URL in .env}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Set ALLOWED_HOSTS in .env}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?Set CSRF_TRUSTED_ORIGINS in .env}
      USE_X_FORWARDED_HOST: ${USE_X_FORWARDED_HOST:-true}
      SECURE_PROXY_SSL_HEADER: ${SECURE_PROXY_SSL_HEADER:-true}
      DB_NAME: ${DB_NAME:-pve_helper}
      DB_USER: ${DB_USER:-pve_helper}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_HOST: db
      DB_PORT: "5432"
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-https://auth.example.com/application/o/pve-helper/}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REQUIRED_GROUP: ${OIDC_REQUIRED_GROUP:-pve-helper-admins}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email groups}
      OIDC_OP_AUTHORIZATION_ENDPOINT: ${OIDC_OP_AUTHORIZATION_ENDPOINT:-}
      OIDC_OP_TOKEN_ENDPOINT: ${OIDC_OP_TOKEN_ENDPOINT:-}
      OIDC_OP_USER_ENDPOINT: ${OIDC_OP_USER_ENDPOINT:-}
      OIDC_OP_JWKS_ENDPOINT: ${OIDC_OP_JWKS_ENDPOINT:-}
      OIDC_OP_END_SESSION_ENDPOINT: ${OIDC_OP_END_SESSION_ENDPOINT:-}
      PVE_ENDPOINTS: ${PVE_ENDPOINTS:-}
      PVE_VERIFY_TLS: ${PVE_VERIFY_TLS:-true}
      PVE_CA_BUNDLE: ${PVE_CA_BUNDLE:-}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      PVE_API_TOKEN_ID: ${PVE_API_TOKEN_ID:-}
      PVE_API_TOKEN_SECRET: ${PVE_API_TOKEN_SECRET:-}
      PVE_HELPER_ENCRYPTION_KEYS: ${PVE_HELPER_ENCRYPTION_KEYS:?Set PVE_HELPER_ENCRYPTION_KEYS in .env}
      PVE_HELPER_ENCRYPTION_ACTIVE_KEY_ID: ${PVE_HELPER_ENCRYPTION_ACTIVE_KEY_ID:?Set PVE_HELPER_ENCRYPTION_ACTIVE_KEY_ID in .env}
      SCHEDULED_ACTION_TIMEOUT_SECONDS: ${SCHEDULED_ACTION_TIMEOUT_SECONDS:-1800}
      BACKUP_TASK_TIMEOUT_SECONDS: ${BACKUP_TASK_TIMEOUT_SECONDS:-21600}
      SCHEDULED_ACTION_POLL_INTERVAL_SECONDS: ${SCHEDULED_ACTION_POLL_INTERVAL_SECONDS:-5}
      SCHEDULED_ACTION_RUN_RETENTION_DAYS: ${SCHEDULED_ACTION_RUN_RETENTION_DAYS:-90}
      CONSOLE_SESSION_RETENTION_HOURS: ${CONSOLE_SESSION_RETENTION_HOURS:-24}
      STORAGE_WRITE_ENABLED: ${STORAGE_WRITE_ENABLED:-false}
      STORAGE_METADATA_REFRESH_INTERVAL_MINUTES: ${STORAGE_METADATA_REFRESH_INTERVAL_MINUTES:-1}
      STORAGE_VOLUME_REFRESH_INTERVAL_MINUTES: ${STORAGE_VOLUME_REFRESH_INTERVAL_MINUTES:-5}
      STORAGE_UPLOAD_MAX_SIZE_MB: ${STORAGE_UPLOAD_MAX_SIZE_MB:-0}
      FILE_UPLOAD_TEMP_DIR: ${FILE_UPLOAD_TEMP_DIR:-}
      STORAGE_IMAGE_INFO_ENABLED: ${STORAGE_IMAGE_INFO_ENABLED:-true}
      STORAGE_IMAGE_INFO_TIMEOUT_SECONDS: ${STORAGE_IMAGE_INFO_TIMEOUT_SECONDS:-15}
      STORAGE_INFLATE_TIMEOUT_SECONDS: ${STORAGE_INFLATE_TIMEOUT_SECONDS:-14400}
      STORAGE_INFLATE_WORKER_PRESERVES_OWNER: ${STORAGE_INFLATE_WORKER_PRESERVES_OWNER:-true}
      SCAN_TASK_TIMEOUT_SECONDS: ${SCAN_TASK_TIMEOUT_SECONDS:-21600}
      Q_CLUSTER_WORKERS: ${Q_CLUSTER_WORKERS:-1}
      Q_CLUSTER_TIMEOUT: ${Q_CLUSTER_TIMEOUT:-1800}
      Q_CLUSTER_RETRY: ${Q_CLUSTER_RETRY:-2100}
      TZ: ${TZ:-Europe/Stockholm}
    command: ["python", "manage.py", "qcluster"]
    user: "0:0"
    group_add:
      - "10001"
    volumes:
      - ./certs/ca-bundle.pem:/etc/ssl/pve-helper-ca-bundle.pem:ro
      - type: bind
        source: ${PVE_HELPER_STORAGE_ROOT:?Set PVE_HELPER_STORAGE_ROOT in .env}
        target: /storages
        bind:
          propagation: rslave
    healthcheck:
      test: ["CMD", "python", "/app/scripts/worker_healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
    pids_limit: 200
    mem_limit: 512m
    cpu_shares: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Bulk data-plane queue. Only the worker service above runs scheduled rows.
  worker-bulk:
    extends:
      service: worker
    environment:
      Q_CLUSTER_NAME: bulk
      Q_BULK_WORKERS: ${Q_BULK_WORKERS:-2}
      Q_BULK_TIMEOUT: ${Q_BULK_TIMEOUT:-21600}
      Q_BULK_RETRY: ${Q_BULK_RETRY:-22200}

volumes:
  postgres_data:
  storage_accel_state:

networks:
  default:
    name: ${PVE_HELPER_NETWORK:-pve-helper}
