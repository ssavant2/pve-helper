# Example layout:
# - nfs-fs: general file/ISO/backup storage, often capacity/spinning disk
# - nfs-vm: VM disk image storage, often SSD-backed
# The `id` must match the Proxmox storage ID.
storages:
  - id: nfs-fs
    display_name: nfs-fs
    export: nfs-server.example.com:/export/proxmox-fs
    host_path: /mnt/pve-helper/truenas-fs
    container_path: /storages/truenas-fs
    trash_path: /storages/truenas-fs/.trash/pve-helper
    expected_consumers:
      - pve-node-1

  - id: nfs-vm
    display_name: nfs-vm
    export: nfs-server.example.com:/export/proxmox-vm
    host_path: /mnt/pve-helper/truenas-vm
    container_path: /storages/truenas-vm
    trash_path: /storages/truenas-vm/.trash/pve-helper
    expected_consumers:
      - pve-node-1
